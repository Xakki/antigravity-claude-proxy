
services:
  antigravity-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-claude-proxy
    restart: unless-stopped
    ports:
      - "${EXTERNAL_WEB_PORT:-8080}:8080"
      - "${EXTERNAL_CALLBACK_PORT:-51122}:${OAUTH_CALLBACK_PORT}"
    volumes:
      # Папка для сессий аккаунтов (oauth)
      - ./data/proxy:/root/.config/antigravity-proxy
      # Папка для настроек самого Claude CLI (управляется через WebUI)
      - ./data/claude:/root/.claude
    env_file:
      - .env